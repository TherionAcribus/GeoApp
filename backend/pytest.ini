[pytest]
# Configuration pytest pour gc-backend

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options de verbosité
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Marqueurs personnalisés
markers =
    unit: Tests unitaires
    integration: Tests d'intégration
    slow: Tests lents (nécessitent plus de temps)
    plugin: Tests liés aux plugins
    api: Tests des endpoints API

# Configuration Flask
env =
    FLASK_ENV=testing
